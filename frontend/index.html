<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق دردشة وملاحظات</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- زر تبديل الوضع (Dark/Light Mode) -->
    <button id="themeToggle" class="theme-btn">🌙 الوضع الليلي</button>

    <!-- شاشة تسجيل الدخول -->
    <div id="loginSection" class="container">
        <div class="login-box">
            <h2>تسجيل الدخول</h2>
            <p>أدخل اسمك للوصول إلى الملاحظات والدردشة (الطرفين فقط)</p>
            <input type="text" id="usernameInput" placeholder="اسم المستخدم..." />
            <button id="loginBtn" class="primary-btn">دخول</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>

    <!-- الواجهة الرئيسية (دردشة + ملاحظات) -->
    <div id="mainApp" class="container hidden">
        <header class="app-header">
            <div>
                <h2>مرحباً، <span id="displayUsername"></span></h2>
            </div>
            <button id="logoutBtn" class="danger-btn">تسجيل خروج</button>
        </header>

        <div class="app-grid">
            
            <!-- لوحة الملاحظات (Notes Dashboard) -->
            <section class="notes-section">
                <div class="section-header">
                    <h3>📝 الملاحظات</h3>
                </div>
                
                <!-- إضافة ملاحظة جديدة -->
                <div class="add-note-box">
                    <textarea id="noteTextInput" placeholder="اكتب ملاحظة جديدة هنا..."></textarea>
                    <div class="note-actions">
                        <select id="noteCategory">
                            <option value="Good">إيجابية (Good)</option>
                            <option value="Bad">سلبية (Bad)</option>
                        </select>
                        <button id="addNoteBtn" class="primary-btn">إضافة ملاحظة</button>
                    </div>
                </div>

                <!-- عرض الملاحظات -->
                <div class="notes-grid">
                    <div class="my-notes">
                        <h4>ملاحظاتي</h4>
                        <div id="myNotesList" class="notes-list"></div>
                    </div>
                    <div class="partner-notes">
                        <h4>ملاحظات الطرف الآخر</h4>
                        <div id="partnerNotesList" class="notes-list"></div>
                    </div>
                </div>
            </section>

            <!-- صندوق الدردشة (Chat Box) -->
            <section class="chat-section">
                <div class="section-header">
                    <h3>💬 الدردشة الفورية</h3>
                    <span class="status-dot"></span>
                </div>
                
                <div id="chatMessages" class="chat-messages">
                    <!-- سيتم إضافة الرسائل هنا -->
                </div>

                <div class="chat-input-box">
                    <input type="text" id="chatInput" placeholder="اكتب رسالتك..." />
                    <button id="sendMsgBtn" class="primary-btn">إرسال</button>
                </div>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
