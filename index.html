<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wateen - وتين</title>
    <!-- Google Fonts: Tajawal -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Theme Toggle -->
    <button id="themeToggle" class="theme-btn">🌙 Dark Mode</button>

    <!-- Login Section -->
    <div id="loginSection" class="container">
        <div class="login-box">
            <div class="logo-area">
                <div class="heart-icon">❤️</div>
                <h2>Wateen</h2>
            </div>
            <p>Welcome to your private space</p>
            <input type="text" id="usernameInput" placeholder="Name (Ali or Zoza)..." />
            <input type="password" id="passwordInput" placeholder="Password..." />
            <button id="loginBtn" class="primary-btn">Log In</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>

    <!-- Main App Interface -->
    <div id="mainApp" class="container hidden">
        <header class="app-header">
            <div class="brand-title">
                <span class="heart-icon-small">❤️</span>
                <h2>Wateen</h2>
            </div>
            <div class="user-info">
                <span>Welcome, <span id="displayUsername"></span></span>
            </div>
            <button id="logoutBtn" class="danger-btn">Log Out</button>
        </header>

        <div class="app-grid">
            
            <!-- Notes Dashboard -->
            <section class="notes-section">
                <div class="section-header">
                    <h3>📝 Notes</h3>
                </div>
                
                <!-- Add New Note -->
                <div class="add-note-box">
                    <textarea id="noteTextInput" placeholder="Write a new note here..."></textarea>
                    <div class="note-actions">
                        <select id="noteCategory">
                            <option value="Good">Positive (Good)</option>
                            <option value="Bad">Negative (Bad)</option>
                        </select>
                        <button id="addNoteBtn" class="primary-btn">Add Note</button>
                    </div>
                </div>

                <!-- Notes Grid -->
                <div class="notes-grid">
                    <div class="my-notes">
                        <h4>My Notes</h4>
                        <div id="myNotesList" class="notes-list"></div>
                    </div>
                    <div class="partner-notes">
                        <h4>Partner's Notes</h4>
                        <div id="partnerNotesList" class="notes-list"></div>
                    </div>
                </div>
            </section>

            <!-- Chat Box -->
            <section class="chat-section">
                <div class="section-header">
                    <h3>💬 Live Chat</h3>
                    <span class="status-dot"></span>
                </div>
                
                <div id="chatMessages" class="chat-messages">
                    <!-- Messages will be added here -->
                </div>

                <div class="chat-input-box">
                    <input type="text" id="chatInput" placeholder="Type your message..." />
                    <button id="sendMsgBtn" class="primary-btn">Send</button>
                </div>
            </section>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
