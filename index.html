<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f43f5e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Wateen">
    <title>Wateen</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.webmanifest?v=1">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    
    <!-- Animated Background -->
    <div class="mesh-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Theme Toggle -->
    <button id="themeToggle" class="theme-btn">🌙 Dark Mode</button>

    <!-- Login Section -->
    <div id="loginSection" class="container">
        <div class="login-box glass-panel">
            <div class="logo-area">
                <div class="heart-icon">❤️</div>
                <h2>Wateen</h2>
            </div>
            <p>Welcome to your private space</p>
            <input type="text" id="usernameInput" placeholder="Name (Ali or Zoza)..." />
            <input type="password" id="passwordInput" placeholder="Password..." />
            <div style="display: flex; align-items: center; margin: 10px 0; gap: 8px;">
                <input type="checkbox" id="rememberMe" />
                <label for="rememberMe" style="cursor: pointer; font-size: 0.9em;">Remember me</label>
            </div>
            <button id="loginBtn" class="primary-btn">Log In</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>

    <!-- Main App Interface -->
    <div id="mainApp" class="container hidden">
        <header class="app-header glass-panel">
            <div class="brand-title">
                <span class="heart-icon-small">❤️</span>
                <h2>Wateen</h2>
            </div>
            <div class="user-info">
                <div id="userAvatar" class="header-avatar">👤</div>
                <span>Welcome, <span id="displayUsername"></span></span>
            </div>
            <button id="logoutBtn" class="danger-btn">Log Out</button>
        </header>

        <div class="app-grid">
            
            <!-- Notes Dashboard -->
            <section class="notes-section glass-panel">
                <div class="section-header">
                    <h3>📝 Notes</h3>
                </div>
                
                <!-- Add New Note -->
                <div class="add-note-box">
                    <textarea id="noteTextInput" placeholder="Write a new note here..."></textarea>
                    <div class="note-actions">
                        <div class="category-toggle">
                            <input type="radio" id="catGood" name="noteCat" value="Good" checked>
                            <label for="catGood" class="cat-btn good-btn">😊 Good</label>
                            
                            <input type="radio" id="catBad" name="noteCat" value="Bad">
                            <label for="catBad" class="cat-btn bad-btn">😔 Bad</label>
                        </div>
                        <button id="addNoteBtn" class="primary-btn">Add Note</button>
                    </div>
                </div>

                <!-- Notes Grid -->
                <div class="notes-grid">
                    <div class="my-notes">
                        <div class="notes-panel-header">
                            <h4>My Notes</h4>
                            <div class="notes-toolbar">
                                <button class="notes-filter-btn active" data-owner="mine" data-filter="all" type="button">All</button>
                                <button class="notes-filter-btn" data-owner="mine" data-filter="good" type="button">Good</button>
                                <button class="notes-filter-btn" data-owner="mine" data-filter="bad" type="button">Bad</button>
                            </div>
                        </div>
                        <div id="myNotesList" class="notes-list"></div>
                    </div>
                    <div class="partner-notes">
                        <div class="notes-panel-header">
                            <h4>Partner's Notes</h4>
                            <div class="notes-toolbar">
                                <button class="notes-filter-btn active" data-owner="partner" data-filter="all" type="button">All</button>
                                <button class="notes-filter-btn" data-owner="partner" data-filter="good" type="button">Good</button>
                                <button class="notes-filter-btn" data-owner="partner" data-filter="bad" type="button">Bad</button>
                            </div>
                        </div>
                        <div id="partnerNotesList" class="notes-list"></div>
                    </div>
                </div>
            </section>

            <!-- Chat Box -->
            <section class="chat-section glass-panel">
                <div class="section-header">
                    <h3>💬 Live Chat</h3>
                    <span class="status-dot"></span>
                </div>
                
                <div id="chatMessages" class="chat-messages">
                    <!-- Messages will be added here -->
                </div>

                <div class="chat-input-box">
                    <input type="text" id="chatInput" placeholder="Type your message..." />
                    <button id="sendMsgBtn" class="primary-btn">Send</button>
                </div>
            </section>
        </div>
    </div>

    <script type="module" src="script.js?v=3"></script>
</body>
</html>
